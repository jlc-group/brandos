# BrandOS - Content & Ads Operating System
# For: brandos.jlcgroup.co -> Node.js/Express (40200)
# Port Scheme: 4xxxx = Marketing & Ads
server {
    listen 80;
    server_name brandos.jlcgroup.co;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # Logging
    access_log D:/Server/nginx/logs/brandos.access.log;
    error_log D:/Server/nginx/logs/brandos.error.log;

    # Proxy to BrandOS app
    location / {
        proxy_pass http://127.0.0.1:40200;
        include D:/Server/nginx/conf/snippets/proxy_common.conf;
    }

    # WebSocket support (for tRPC subscriptions if needed)
    location /api/trpc {
        proxy_pass http://127.0.0.1:40200;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        include D:/Server/nginx/conf/snippets/proxy_common.conf;
    }
}
