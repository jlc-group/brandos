# BrandOS - Jula Content Brain
# For: brandos.jlcgroup.co -> Node.js (40200)
# Port Scheme: 4xxxx = Marketing & Ads
server {
    listen 80;
    server_name brandos.jlcgroup.co;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Logging
    access_log D:/Server/nginx/logs/brandos.access.log;
    error_log  D:/Server/nginx/logs/brandos.error.log;

    location / {
        proxy_pass http://127.0.0.1:40200;
        include D:/Server/nginx/conf/snippets/proxy_common.conf;

        # WebSocket support (for Vite HMR in dev, or future realtime)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
